server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip sıkıştırma — JS/CSS/SVG için
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache: hashed asset dosyaları (1 yıl)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Statik dosyalar: robots.txt, favicon vb. — SPA fallback'ından ÖNCE sun
    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
    }

    location = /vite.svg {
        try_files /vite.svg =404;
    }

    # SPA fallback: bilinen dosya yoksa index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
